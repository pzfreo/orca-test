name: Slice

on:
  push:
  pull_request:

jobs:
  slice:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CadQuery
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate STEP files
        run: python generate_plates.py

      - uses: estampo/estampo/action@v1
        with:
          config: estampo.toml
